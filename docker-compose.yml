services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codecopy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codecopy}
      POSTGRES_DB: ${POSTGRES_DB:-codecopybook}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  codecopybook:
    build: .
    image: codecopybook:local
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - DATA_DIR=/data
      - FRONTEND_DIR=/app/frontend
      - DATABASE_URL=${DATABASE_URL:-postgres://${POSTGRES_USER:-codecopy}:${POSTGRES_PASSWORD:-codecopy}@postgres:5432/${POSTGRES_DB:-codecopybook}?sslmode=disable}
      - AUTH_SECRET=${AUTH_SECRET:-dev-secret-change-me}
    volumes:
      - type: bind
        source: ./data
        target: /data
    restart: unless-stopped

volumes:
  pgdata:
