services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codecopy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codecopy}
      POSTGRES_DB: ${POSTGRES_DB:-codecopybook}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  codecopybook:
    build: .
    image: codecopybook:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - DATA_DIR=/data
      - FRONTEND_DIR=/app/frontend
      - DATABASE_URL=${DATABASE_URL:-postgres://${POSTGRES_USER:-codecopy}:${POSTGRES_PASSWORD:-codecopy}@postgres:5432/${POSTGRES_DB:-codecopybook}?sslmode=disable}
      # Redis 进度写回缓冲（T1）。留空则退回直连 DB
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - DB_MAX_CONNS=${DB_MAX_CONNS:-50}
      - AUTH_SECRET=${AUTH_SECRET:-dev-secret-change-me}
      # 演示账号：前端预填 + 启动自动 seed，免注册直接登录
      - DEMO_EMAIL=${DEMO_EMAIL:-demo@codejym.dev}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-demo1234}
      # Token 超时时间配置（可选）
      # 格式：30m(30分钟), 24h(24小时), 7d(7天)
      # 未配置时默认为 24 小时
      - AUTH_TOKEN_TTL=${AUTH_TOKEN_TTL:-24h}
      # 文件存储配置
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      # S3 配置（使用 S3 存储时需要）
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_URL_PREFIX=${S3_URL_PREFIX}
    volumes:
      - type: bind
        source: ./data
        target: /data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
