# Nginx 反向代理配置 - jiezispace.com

server {
    listen 80;
    server_name jiezispace.com www.jiezispace.com;

    # 日志配置
    access_log /var/log/nginx/jiezispace_access.log;
    error_log /var/log/nginx/jiezispace_error.log;

    # 代理到 Docker 应用
    location / {
        proxy_pass http://codecopybook:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态文件缓存（可选）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        proxy_pass http://codecopybook:8080;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # 健康检查端点
    location /healthz {
        proxy_pass http://codecopybook:8080/healthz;
        access_log off;
    }
}

