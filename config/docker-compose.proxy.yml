name: codejym

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codecopy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codecopy}
      POSTGRES_DB: ${POSTGRES_DB:-codecopybook}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codecopy} -d ${POSTGRES_DB:-codecopybook} || pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  codecopybook:
    build:
      context: ..
      dockerfile: config/Dockerfile
    image: codecopybook:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    environment:
      - DATA_DIR=/data
      - FRONTEND_DIR=/app/frontend
      - DATABASE_URL=${DATABASE_URL:-postgres://${POSTGRES_USER:-codecopy}:${POSTGRES_PASSWORD:-codecopy}@postgres:5432/${POSTGRES_DB:-codecopybook}?sslmode=disable}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - DB_MAX_CONNS=${DB_MAX_CONNS:-50}
      - AUTH_SECRET=${AUTH_SECRET:-dev-secret-change-me}
      - MODEL_CONFIG_SECRET=${MODEL_CONFIG_SECRET:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AUTH_TOKEN_TTL=${AUTH_TOKEN_TTL:-24h}
      - DEMO_EMAIL=${DEMO_EMAIL:-demo@codejym.dev}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-demo1234}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_URL_PREFIX=${S3_URL_PREFIX:-}
    volumes:
      - type: bind
        source: ../data
        target: /data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - codecopybook
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://codecopybook:8080 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 或使用 Caddy 反向代理（更简单，自动 HTTPS）
  # 取消下面的注释并注释掉上面的 nginx 来使用 Caddy
  #
  # caddy:
  #   image: caddy:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - codecopybook

volumes:
  pgdata:
  redisdata:
  nginx_logs:
  # caddy_data:
  # caddy_config:

networks:
  default:
    name: codejym_network
