# T2 负载均衡：把请求分发到多个无状态 app 副本。
# 用 Docker 内嵌 DNS（127.0.0.11）+ proxy_pass 变量的写法，强制每次请求重新解析
# 服务名 codecopybook —— Docker 会按轮询返回各副本 IP，从而实现负载均衡。
# （若直接 proxy_pass http://codecopybook:8080，nginx 只在启动时解析一次、固定打到一个副本。）
server {
    listen 80;
    server_name _;

    client_max_body_size 64m;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $backend "codecopybook:8080";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
