# Lean CI gate: keep fast deterministic checks separate from the heavier Docker
# smoke test so pull requests fail quickly and runner time is not wasted.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend gate
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Go format, test, vet
        run: ./scripts/test-local.sh backend

  frontend:
    name: Frontend gate
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Vitest, build, lint
        run: ./scripts/test-local.sh frontend

  smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Compose smoke test
        env:
          CI: "true"
          CLEANUP: "1"
          COMPOSE_PROJECT_NAME: codejym-ci-${{ github.run_id }}
          PORT: "19080"
          POSTGRES_PORT: "15433"
        run: ./scripts/test-local.sh smoke

  summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, smoke]
    if: ${{ always() }}
    steps:
      - name: Write summary
        run: |
          {
            echo "## CodeJYM CI"
            echo
            echo "| Layer | Result |"
            echo "| --- | --- |"
            echo "| Backend | ${{ needs.backend.result }} |"
            echo "| Frontend | ${{ needs.frontend.result }} |"
            echo "| Docker smoke | ${{ needs.smoke.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          test "${{ needs.backend.result }}" = "success"
          test "${{ needs.frontend.result }}" = "success"
          test "${{ needs.smoke.result }}" = "success"
