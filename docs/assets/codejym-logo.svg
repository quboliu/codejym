<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">CodeJYM</title>
  <desc id="desc">CodeJYM logo with a code bracket barbell mark.</desc>
  <defs>
    <linearGradient id="badge" x1="18" y1="22" x2="154" y2="158" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#262626"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="176" y1="47" x2="389" y2="121" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect x="18" y="22" width="136" height="136" rx="34" fill="url(#badge)"/>
  <rect x="20.5" y="24.5" width="131" height="131" rx="31.5" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="3"/>
  <g fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M73 57H54v66h19"/>
    <path d="M99 57h19v66H99"/>
    <path d="M60 90h52"/>
  </g>
  <circle cx="86" cy="90" r="7" fill="#14b8a6"/>

  <text x="180" y="91" fill="#111827" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="0">
    Code<tspan fill="url(#accent)">JYM</tspan>
  </text>
  <text x="184" y="126" fill="#525252" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="0">
    Trace it. Blank it. Master it.
  </text>
  <rect x="184" y="141" width="198" height="6" rx="3" fill="url(#accent)"/>
